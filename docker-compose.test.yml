# Live full-stack test dependencies: a throwaway MongoDB + MinIO. Used by
# `npm run test:live` and the Playwright e2e suite. Isolated ports/credentials so
# they don't collide with your dev instances.
services:
  mongo-test:
    image: mongo:7
    ports:
      - '27018:27017'
    tmpfs:
      - /data/db # ephemeral; no persistence between runs

  minio-test:
    image: minio/minio:latest
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9010:9000'
      - '9011:9011'
    tmpfs:
      - /data
